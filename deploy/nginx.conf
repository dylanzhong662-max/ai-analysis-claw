server {
    listen 80;
    server_name _;          # 匹配任意 IP/域名，有域名时替换为 your.domain.com

    # ── 前端静态文件 ──────────────────────────────────────────────
    root /opt/finance-analysis/frontend/dist;
    index index.html;

    # React SPA：所有非 /api 请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 后端 API 反向代理 ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;    # 信号刷新/扫描任务可能耗时较长
    }

    # 关闭访问日志（可选，减少磁盘写入）
    # access_log off;
    error_log /var/log/nginx/finance-error.log warn;
}
